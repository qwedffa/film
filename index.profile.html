<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="./output.css" rel="stylesheet">
</head>
<body>
    <style>
    .hero-bg {
      background-size: cover;
      background-position: center;
    }
    .movie-card {
      transition: all 0.3s ease;
    }
    .movie-card:hover {
      transform: scale(1.08);
      z-index: 10;
    }
    .heart.liked {
      color: #ef4444;
      transform: scale(1.2);
    }
  </style>
</head>
<body class="bg-zinc-950 text-white">

  <!-- Навигация -->
  <nav class="bg-black/95 backdrop-blur-md border-b border-zinc-800 fixed w-full z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-8">
        <h1 button onclick="window.location.href='index.netflix.html'" class="text-3xl font-bold text-red-600 cursor-pointer">Netflix</h1>
      </div>
      
      <div class="flex-1 max-w-xl mx-8">
        <div class="relative">
          <input type="text" id="searchInput" placeholder="Поиск по названию..."
                 class="w-full bg-zinc-900 border border-zinc-700 rounded-full py-3 px-6 pl-12 focus:outline-none focus:border-red-600">
          <i class="fas fa-search absolute left-5 top-3.5 text-gray-400"></i>
        </div>
      </div>

      <div class="flex items-center gap-6">
        <button onclick="showFavorites()" class="flex items-center gap-2 hover:text-red-500 transition">
          <i class="fas fa-heart text-xl"></i>
          <span id="favCount" class="text-sm font-medium">0</span>
        </button>
        
        <div class="flex items-center gap-6">
            <button onclick="showFavorites()" class="flex items-center gap-2 hover:text-red-500 transition">
            <i class="fas fa-heart text-xl"></i>
            <span id="favCount" class="text-sm font-medium">0</span>
            </button>
             <button onclick="window.location.href='index.netflix.html'" 
                class="px-6 py-2 bg-red-600 hover:bg-red-700 rounded-full text-sm font-medium transition">
          <i class="fas fa-user"></i>
          <span>Главная</span>
        </button>
        </div>

      </div>
    </div>
  </nav>

  <!-- Hero баннер профиля -->
  <section class="relative h-[500px] pt-16">
    <div class="absolute inset-0 hero-bg" 
         style="background-image: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85))">
    </div>
    <div class="max-w-7xl mx-auto px-6 relative z-10 h-full flex items-center pb-12">
      <div class="flex items-end gap-8">
        <div class="w-40 h-40 rounded-full overflow-hidden border-4 border-red-600">
          <img src="img/avatar/bgboss.webp" alt="Аватар" class="w-full h-full object-cover">
        </div>
        <div>
          <h1 class="text-5xl font-bold">Алексей Иванов</h1>
          <p class="text-xl text-gray-300">alexey@example.com</p>
          <p class="text-red-500 mt-2">Подписка: <span class="font-medium">Premium</span></p>
        </div>
      </div>
    </div>
  </section>

  <main class="max-w-7xl mx-auto px-6 py-12">
    
    <!-- Кнопки управления профилем -->
    <div class="flex gap-4 mb-10 border-b border-zinc-800 pb-6">
      <button onclick="showSection('favorites')" class="profile-tab active px-8 py-3 rounded-full border border-red-600 text-red-500">Мои избранные</button>
      <button onclick="showSection('history')" class="profile-tab px-8 py-3 rounded-full hover:bg-zinc-900">История просмотров</button>
      <button onclick="showSection('settings')" class="profile-tab px-8 py-3 rounded-full hover:bg-zinc-900">Настройки аккаунта</button>
    </div>

    <!-- Избранное -->
    <div id="favorites-section" class="section">
      <h2 class="text-3xl font-semibold mb-8">Избранное</h2>
      <div id="favoritesGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6"></div>
    </div>

    <!-- История просмотров -->
    <div id="history-section" class="section hidden">
      <h2 class="text-3xl font-semibold mb-8">Продолжить просмотр</h2>
      <div id="historyGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6"></div>
    </div>

    <!-- Настройки -->
    <div id="settings-section" class="section hidden">
      <h2 class="text-3xl font-semibold mb-8">Настройки аккаунта</h2>
      <div class="max-w-lg bg-zinc-900 rounded-2xl p-8">
        <div class="space-y-6">
          <div>
            <label class="block text-gray-400 mb-2">Имя</label>
            <input type="text" value="Алексей Иванов" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-5 py-4 focus:outline-none focus:border-red-600">
          </div>
          <div>
            <label class="block text-gray-400 mb-2">Email</label>
            <input type="email" value="alexey@example.com" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-5 py-4 focus:outline-none focus:border-red-600">
          </div>
          <div>
            <label class="block text-gray-400 mb-2">Язык интерфейса</label>
            <select class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-5 py-4 focus:outline-none focus:border-red-600">
              <option>Русский</option>
              <option>English</option>
            </select>
          </div>
          <button onclick="alert('Настройки сохранены! ✅')" 
                  class="w-full bg-red-600 hover:bg-red-700 py-4 rounded-xl font-medium text-lg transition">
            Сохранить изменения
          </button>
          <button onclick="alert('Вы вышли из аккаунта')" 
                  class="w-full bg-zinc-800 hover:bg-zinc-700 py-4 rounded-xl font-medium border border-zinc-600">
            Выйти из аккаунта
          </button>
        </div>
      </div>
    </div>
  </main>

  <script>
    // Данные для примера
    const favorites = [
      { id: 1, title: "Oppenheimer", rating: 8.3, img: "img/oppenheimer.jpg" },
      { id: 4, title: "The Boys", rating: 8.7, img: "img/theboys.png" },
      { id: 8, title: "The Last of Us", rating: 9.0, img: "img/thelastus.jpg" },
    ];

    const history = [
      { id: 3, title: "House of the Dragon", progress: "65%", img: "img/houseofdragons.jpg" },
      { id: 6, title: "Spider-Man: No Way Home", progress: "30%", img: "img/spider.jpg" },
    ];

    function renderGrid(containerId, items, isHistory = false) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';
      
      items.forEach(item => {
        const card = document.createElement('div');
        card.className = 'movie-card cursor-pointer group relative';
        card.innerHTML = `
          <div class="relative rounded-xl overflow-hidden">
            <img src="${item.img}" class="w-full aspect-[2/3] object-cover group-hover:scale-105 transition-transform duration-300" alt="${item.title}">
            ${isHistory ? `<div class="absolute bottom-0 left-0 right-0 h-1.5 bg-red-600" style="width: ${item.progress}"></div>` : ''}
            <div class="absolute top-3 right-3 text-2xl heart text-white/80 hover:text-red-500">
              <i class="fas fa-heart"></i>
            </div>
          </div>
          <p class="mt-3 font-medium">${item.title}</p>
          ${!isHistory ? `<p class="text-sm text-gray-400">${item.rating} ★</p>` : `<p class="text-sm text-red-500">${item.progress} просмотрено</p>`}
        `;
        container.appendChild(card);
      });
    }

    function showSection(section) {
      document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
      document.getElementById(section + '-section').classList.remove('hidden');
      
      document.querySelectorAll('.profile-tab').forEach(tab => tab.classList.remove('active', 'border-red-600', 'text-red-500'));
      event.currentTarget.classList.add('active', 'border-red-600', 'text-red-500');
    }

    function showFavorites() {
      alert("Переход в избранное (можно сделать отдельную страницу)");
    }

    // Инициализация
    window.onload = () => {
      renderGrid('favoritesGrid', favorites);
      renderGrid('historyGrid', history, true);
      document.getElementById('favCount').textContent = favorites.length;
    };
  </script>


</body>
</html>
